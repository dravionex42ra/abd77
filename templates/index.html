<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sora Archiver | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #6366f1;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
        }

        .container {
            width: 90%;
            max-width: 800px;
            backdrop-filter: blur(20px);
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-top: 5px;
        }

        .batch-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .batch-count {
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .refresh-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sora Archive Monitor</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-batches">0</div>
                <div class="stat-label">Total Batches</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-downloads">0</div>
                <div class="stat-label">Videos Downloaded</div>
            </div>
        </div>

        <h3>Active Result Folders</h3>
        <div id="batch-container"></div>

        <button class="refresh-btn" onclick="updateStats()">Refresh Dashboard</button>
    </div>

    <script>
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('total-batches').innerText = data.total_batches;
                document.getElementById('total-downloads').innerText = data.total_downloads;
                
                const container = document.getElementById('batch-container');
                container.innerHTML = '';
                data.batches.forEach(batch => {
                    const item = document.createElement('div');
                    item.className = 'batch-item';
                    item.innerHTML = `<span>${batch.name}</span><span class="batch-count">${batch.count} files</span>`;
                    container.appendChild(item);
                });
            } catch (e) { console.error("Fetch Error:", e); }
        }
        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
